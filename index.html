<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Control de Caja - Minimarket</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#F7F4ED;font-family:'Space Grotesk',sans-serif}
    input,select,textarea,button{font-family:'IBM Plex Mono',monospace}
    button{cursor:pointer}
    .rh:hover{background:#F1EDE2}
    .sb:active{transform:scale(.97)}
    @media(max-width:600px){.hm{display:none!important}}
  </style>
</head>
<body>
<div id="root"><div style="display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:monospace;color:#9A9486">Cargando...</div></div>
<script type="text/babel">
const {useState,useEffect,useMemo,useCallback,useRef} = React;

const db = {
  get:(k)=>{ try{const v=localStorage.getItem(k);return v?JSON.parse(v):null}catch(e){return null} },
  set:(k,v)=>{ try{localStorage.setItem(k,JSON.stringify(v))}catch(e){} }
};

const uid     = ()=>Math.random().toString(36).slice(2,9)+Date.now().toString(36);
const money   = (n)=>new Intl.NumberFormat("es-CL",{style:"currency",currency:"CLP",maximumFractionDigits:0}).format(Math.round(n||0));
const today   = ()=>new Date().toISOString().slice(0,10);
const fmtDate = (d)=>new Date(d+"T00:00:00").toLocaleDateString("es-CL",{day:"2-digit",month:"short"});

function Ico({name,size=16,color="currentColor"}){
  const p={width:size,height:size,viewBox:"0 0 24 24",fill:"none",stroke:color,strokeWidth:2,strokeLinecap:"round",strokeLinejoin:"round"};
  if(name==="Plus")         return <svg {...p}><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>;
  if(name==="Trash")        return <svg {...p}><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>;
  if(name==="Up")           return <svg {...p}><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>;
  if(name==="Down")         return <svg {...p}><polyline points="23 18 13.5 8.5 8.5 13.5 1 6"/><polyline points="17 18 23 18 23 12"/></svg>;
  if(name==="Box")          return <svg {...p}><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>;
  if(name==="Receipt")      return <svg {...p}><path d="M4 2v20l2-1 2 1 2-1 2 1 2-1 2 1 2-1 2 1V2l-2 1-2-1-2 1-2-1-2 1-2-1-2 1-2-1z"/><line x1="8" y1="10" x2="16" y2="10"/><line x1="8" y1="14" x2="16" y2="14"/></svg>;
  if(name==="Alert")        return <svg {...p}><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>;
  if(name==="X")            return <svg {...p}><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>;
  if(name==="Store")        return <svg {...p}><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>;
  if(name==="Camera")       return <svg {...p}><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>;
  if(name==="Barcode")      return <svg {...p}><line x1="3" y1="5" x2="3" y2="19"/><line x1="7" y1="5" x2="7" y2="19"/><line x1="11" y1="5" x2="11" y2="19"/><line x1="15" y1="5" x2="15" y2="19"/><line x1="19" y1="5" x2="19" y2="19"/></svg>;
  return null;
}

function CameraScanner({onDetected,onClose}){
  const vRef=useRef(null), stRef=useRef(null), runRef=useRef(true);
  const [msg,setMsg]=useState("Iniciando camara...");
  const ok="BarcodeDetector" in window;
  useEffect(()=>{
    if(!ok) return;
    (async()=>{
      try{
        const det=new window.BarcodeDetector({formats:["ean_13","ean_8","upc_a","upc_e","code_128","code_39","itf"]});
        const st=await navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:"environment"}}});
        stRef.current=st;
        vRef.current.srcObject=st;
        await vRef.current.play();
        setMsg("Apunta al codigo de barras...");
        const loop=async()=>{
          if(!runRef.current) return;
          try{const r=await det.detect(vRef.current);if(r.length>0){onDetected(r[0].rawValue);return;}}catch(e){}
          setTimeout(loop,300);
        };
        loop();
      }catch(e){setMsg("Sin acceso a la camara. Revisa permisos.");}
    })();
    return()=>{runRef.current=false;stRef.current&&stRef.current.getTracks().forEach(t=>t.stop());};
  },[]);
  const ov={position:"fixed",inset:0,background:"rgba(0,0,0,.85)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center",padding:16};
  const bx={background:"#fff",borderRadius:14,padding:18,width:"100%",maxWidth:400};
  const cb={width:"100%",background:"#20201D",color:"#fff",border:"none",borderRadius:8,padding:"10px 0",fontWeight:600,fontSize:14,marginTop:12,cursor:"pointer"};
  if(!ok) return <div style={ov}><div style={bx}><p style={{color:"#B5402C",textAlign:"center",lineHeight:1.6}}>Tu navegador no soporta escaner por camara.<br/>Usa Chrome o una pistola lectora USB.</p><button onClick={onClose} style={cb}>Cerrar</button></div></div>;
  return(
    <div style={ov}><div style={bx}>
      <div style={{position:"relative",background:"#000",borderRadius:10,overflow:"hidden",marginBottom:10}}>
        <video ref={vRef} muted playsInline style={{width:"100%",maxHeight:280,display:"block"}}/>
        <div style={{position:"absolute",inset:"10%",border:"2px solid #2F6B4F",borderRadius:8,pointerEvents:"none"}}/>
      </div>
      <p style={{textAlign:"center",fontSize:12,color:"#9A9486",marginBottom:4}}>{msg}</p>
      <button onClick={onClose} style={cb}>Cancelar</button>
    </div></div>
  );
}

function App(){
  const [store,setStore]     = useState(()=>db.get("store")||"Mi Minimarket");
  const [prods,setProds]     = useState(()=>db.get("prods")||[]);
  const [moves,setMoves]     = useState(()=>db.get("moves")||[]);
  const [tab,setTab]         = useState("resumen");
  const [prodModal,setProdModal] = useState(false);
  const [moveModal,setMoveModal] = useState(null);
  const [editing,setEditing]     = useState(null);
  const [toast,setToast]         = useState(null);
  const [camera,setCamera]       = useState(null);
  const [pendingBC,setPendingBC] = useState(null);

  useEffect(()=>db.set("store",store),[store]);
  useEffect(()=>db.set("prods",prods),[prods]);
  useEffect(()=>db.set("moves",moves),[moves]);

  const toast2=(m)=>{setToast(m);setTimeout(()=>setToast(null),2500);};

  const totals=useMemo(()=>{
    let i=0,e=0;
    moves.forEach(m=>m.type==="venta"?i+=m.total:e+=m.total);
    return {i,e,s:i-e};
  },[moves]);

  const lowStock  = useMemo(()=>prods.filter(p=>p.stock<=p.min),[prods]);
  const topSold   = useMemo(()=>{
    const map={};
    moves.forEach(m=>{if(m.type==="venta") map[m.pid]=(map[m.pid]||0)+m.qty;});
    return Object.entries(map).map(([id,q])=>({p:prods.find(x=>x.id===id),q})).filter(x=>x.p).sort((a,b)=>b.q-a.q).slice(0,5);
  },[moves,prods]);
  const recent=useMemo(()=>[...moves].sort((a,b)=>(b.date+b.id).localeCompare(a.date+a.id)).slice(0,14),[moves]);

  const saveProd=(d)=>{
    if(d.id) setProds(p=>p.map(x=>x.id===d.id?{...x,...d}:x));
    else     setProds(p=>[...p,{...d,id:uid()}]);
    toast2(d.id?"Producto actualizado":"Producto agregado");
    setProdModal(false); setEditing(null); setPendingBC(null);
  };
  const delProd=(id)=>{setProds(p=>p.filter(x=>x.id!==id));toast2("Eliminado");};

  const saveMove=({type,pid,qty,price,note})=>{
    qty=Number(qty);
    const date=today();
    if(type==="gasto"){
      setMoves(m=>[...m,{id:uid(),type:"gasto",pid:null,qty:1,price:Number(price),total:Number(price),date,note}]);
      toast2("Gasto registrado"); setMoveModal(null); return;
    }
    const prod=prods.find(p=>p.id===pid);
    if(!prod) return;
    const pr=price!==""&&price!==undefined?Number(price):(type==="venta"?prod.sale:prod.cost);
    setProds(p=>p.map(x=>x.id===pid?{...x,stock:x.stock+(type==="venta"?-qty:qty)}:x));
    setMoves(m=>[...m,{id:uid(),type,pid,qty,price:pr,total:pr*qty,date,note:""}]);
    toast2(type==="venta"?"Venta registrada":"Compra registrada");
    setMoveModal(null);
  };
  const delMove=(m)=>{
    if(m.type!=="gasto") setProds(p=>p.map(x=>x.id===m.pid?{...x,stock:x.stock+(m.type==="venta"?m.qty:-m.qty)}:x));
    setMoves(p=>p.filter(x=>x.id!==m.id)); toast2("Movimiento eliminado");
  };

  const S=st;
  return(
    <div style={S.app}>
      {toast&&<div style={S.toast}>{toast}</div>}
      {camera==="prod"&&<CameraScanner onDetected={c=>{setCamera(null);setPendingBC(c);setProdModal(true);toast2("Codigo: "+c);}} onClose={()=>setCamera(null)}/>}
      {camera==="move"&&<CameraScanner onDetected={c=>{setCamera(null);setPendingBC(c);}} onClose={()=>setCamera(null)}/>}

      <div style={{padding:"20px 16px 0",display:"flex",justifyContent:"center"}}>
        <div style={{width:"100%",maxWidth:720,background:"#fff",boxShadow:"0 1px 4px rgba(0,0,0,.07)"}}>
          <div style={S.perf}/>
          <div style={{padding:"20px 24px 16px"}}>
            <div style={{display:"flex",alignItems:"center",gap:9}}><Ico name="Store" size={19}/><input value={store} onChange={e=>setStore(e.target.value)} style={S.storeInput}/></div>
            <div style={S.meta}>CONTROL DE CAJA &middot; {new Date().toLocaleDateString("es-CL",{weekday:"long",day:"2-digit",month:"long",year:"numeric"}).toUpperCase()}</div>
            <div style={S.dashed}/>
            <div style={{display:"flex",alignItems:"center"}}>
              <SC label="INGRESOS" val={money(totals.i)} color="#2F6B4F" ico="Up"/>
              <div style={S.vd}/>
              <SC label="EGRESOS"  val={money(totals.e)} color="#B5402C" ico="Down"/>
              <div style={S.vd}/>
              <SC label="SALDO"    val={money(totals.s)} color={totals.s>=0?"#20201D":"#B5402C"} ico="Receipt"/>
            </div>
          </div>
          <div style={S.perf}/>
        </div>
      </div>

      <div style={{display:"flex",gap:20,maxWidth:720,margin:"0 auto",padding:"16px 16px 0",borderBottom:"1px solid #EAE5D8"}}>
        {[["resumen","Resumen"],["productos","Productos ("+prods.length+")"],["movimientos","Movimientos"]].map(([k,l])=>(
          <button key={k} onClick={()=>setTab(k)} style={{...S.tab,color:tab===k?"#20201D":"#9A9486",borderBottom:tab===k?"2px solid #20201D":"2px solid transparent",fontWeight:tab===k?600:500}}>{l}</button>
        ))}
      </div>

      <div style={{display:"flex",gap:8,maxWidth:720,margin:"14px auto 0",padding:"0 16px",flexWrap:"wrap"}}>
        <AB bg="#2F6B4F" onClick={()=>{setPendingBC(null);setMoveModal("venta");}}><Ico name="Plus" size={13}/> Venta</AB>
        <AB bg="#B5402C" onClick={()=>{setPendingBC(null);setMoveModal("compra");}}><Ico name="Plus" size={13}/> Compra</AB>
        <AB bg="#C98A2E" onClick={()=>{setPendingBC(null);setMoveModal("gasto");}}><Ico name="Plus" size={13}/> Gasto</AB>
        <AB bg="#20201D" onClick={()=>{setEditing(null);setPendingBC(null);setProdModal(true);}}><Ico name="Box" size={13}/> Producto</AB>
        <AB bg="#4A5568" onClick={()=>setCamera("prod")}><Ico name="Camera" size={13}/> Escanear</AB>
      </div>

      <div style={{maxWidth:720,margin:"18px auto 0",padding:"0 16px 40px"}}>
        {tab==="resumen"     &&<Resumen lowStock={lowStock} topSold={topSold} recent={recent} prods={prods} delMove={delMove}/>}
        {tab==="productos"   &&<Productos prods={prods} onEdit={p=>{setEditing(p);setProdModal(true);}} onDel={delProd}/>}
        {tab==="movimientos" &&<Movimientos moves={moves} prods={prods} onDel={delMove}/>}
      </div>

      {prodModal&&<ProdModal prod={editing} bc={pendingBC} onClose={()=>{setProdModal(false);setEditing(null);setPendingBC(null);}} onSave={saveProd} onCam={()=>setCamera("prod")}/>}
      {moveModal&&<MoveModal type={moveModal} prods={prods} bc={pendingBC} onClose={()=>{setMoveModal(null);setPendingBC(null);}} onSave={saveMove} onCam={()=>{setCamera("move");setMoveModal(null);}} findBC={c=>prods.find(x=>x.barcode===c)}/>}
    </div>
  );
}

function AB({bg,onClick,children}){return <button className="sb" onClick={onClick} style={{display:"flex",alignItems:"center",gap:5,background:bg,color:"#fff",border:"none",borderRadius:7,padding:"8px 13px",fontSize:12.5,fontWeight:600}}>{children}</button>;}
function SC({label,val,color,ico}){return <div style={{flex:1,minWidth:0}}><div style={{display:"flex",alignItems:"center",gap:5,color:"#9A9486",fontSize:10.5,letterSpacing:".07em",marginBottom:3}}><Ico name={ico} size={11}/>{label}</div><div style={{fontFamily:"'IBM Plex Mono',monospace",fontWeight:600,fontSize:"clamp(14px,3.8vw,19px)",color,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{val}</div></div>;}

function ProdModal({prod,bc,onClose,onSave,onCam}){
  const [name,setName]   = useState(prod?prod.name:"");
  const [barcode,setBC]  = useState(bc||prod&&prod.barcode||"");
  const [unit,setUnit]   = useState(prod?prod.unit:"u.");
  const [stock,setStock] = useState(prod!=null?prod.stock:0);
  const [min,setMin]     = useState(prod!=null?prod.min:5);
  const [cost,setCost]   = useState(prod!=null?prod.cost:"");
  const [sale,setSale]   = useState(prod!=null?prod.sale:"");
  const ok=name.trim()&&cost!==""&&sale!=="";
  return(
    <Modal onClose={onClose} title={prod?"Editar producto":"Nuevo producto"}>
      <div style={{background:"#F7F4ED",borderRadius:9,padding:"12px 14px",marginBottom:16}}>
        <div style={{fontSize:11,color:"#9A9486",letterSpacing:".05em",marginBottom:8,display:"flex",alignItems:"center",gap:5}}><Ico name="Barcode" size={12}/>CODIGO DE BARRAS (opcional)</div>
        <div style={{display:"flex",gap:8}}>
          <input value={barcode} onChange={e=>setBC(e.target.value)} onKeyDown={e=>e.key==="Enter"&&e.preventDefault()} style={{...st.inp,flex:1,background:"#fff"}} placeholder="Escanea o escribe el codigo..."/>
          <button onClick={onCam} style={{background:"#20201D",color:"#fff",border:"none",borderRadius:7,padding:"0 12px",display:"flex",alignItems:"center",gap:5,fontSize:12,cursor:"pointer"}}><Ico name="Camera" size={14} color="#fff"/> Camara</button>
        </div>
        <div style={{fontSize:11,color:"#9A9486",marginTop:6}}>Con pistola USB: haz clic aqui y escanea.</div>
      </div>
      <F label="Nombre"><input autoFocus={!bc} value={name} onChange={e=>setName(e.target.value)} style={st.inp} placeholder="Ej: Coca-Cola 1.5L"/></F>
      <div style={{display:"flex",gap:10}}>
        <F label="Stock" s={{flex:1}}><input type="number" value={stock} onChange={e=>setStock(e.target.value)} style={st.inp}/></F>
        <F label="Unidad" s={{flex:1}}><input value={unit} onChange={e=>setUnit(e.target.value)} style={st.inp} placeholder="u. / kg"/></F>
      </div>
      <div style={{display:"flex",gap:10}}>
        <F label="Costo ($)" s={{flex:1}}><input type="number" value={cost} onChange={e=>setCost(e.target.value)} style={st.inp}/></F>
        <F label="Precio venta ($)" s={{flex:1}}><input type="number" value={sale} onChange={e=>setSale(e.target.value)} style={st.inp}/></F>
      </div>
      <F label="Alerta stock minimo"><input type="number" value={min} onChange={e=>setMin(e.target.value)} style={st.inp}/></F>
      <button disabled={!ok} className="sb" style={{...st.pbtn,opacity:ok?1:.4}}
        onClick={()=>onSave({id:prod&&prod.id,name:name.trim(),barcode:barcode.trim(),unit:unit||"u.",stock:Number(stock)||0,min:Number(min)||0,cost:Number(cost),sale:Number(sale)})}>
        {prod?"Guardar cambios":"Agregar producto"}
      </button>
    </Modal>
  );
}

function MoveModal({type,prods,bc,onClose,onSave,onCam,findBC}){
  const [pid,setPid]     = useState(prods[0]&&prods[0].id||"");
  const [qty,setQty]     = useState(1);
  const [price,setPrice] = useState("");
  const [note,setNote]   = useState("");
  const [bci,setBCI]     = useState(bc||"");
  const [bcMsg,setBCMsg] = useState(null);
  const prod=prods.find(p=>p.id===pid);
  useEffect(()=>{if(bc) match(bc);},[]);
  const match=(c)=>{
    const f=findBC(c.trim());
    if(f){setPid(f.id);setBCMsg({ok:true,t:"Producto: "+f.name});setBCI(c);}
    else  setBCMsg({ok:false,t:"Sin producto con codigo '"+c+"'. Agregalo primero."});
  };
  if(type==="gasto"){
    const ok=note.trim()&&price!==""&&Number(price)>0;
    return(
      <Modal onClose={onClose} title="Registrar gasto">
        <F label="Descripcion"><input autoFocus value={note} onChange={e=>setNote(e.target.value)} style={st.inp} placeholder="Ej: Pago de luz, arriendo..."/></F>
        <F label="Monto ($)"><input type="number" value={price} onChange={e=>setPrice(e.target.value)} style={st.inp}/></F>
        <button disabled={!ok} className="sb" style={{...st.pbtn,background:"#C98A2E",opacity:ok?1:.4}} onClick={()=>onSave({type:"gasto",price,note})}>Registrar gasto</button>
      </Modal>
    );
  }
  if(!prods.length) return <Modal onClose={onClose} title="Sin productos"><p style={{color:"#9A9486",fontSize:13}}>Primero agrega un producto.</p></Modal>;
  const insuf=type==="venta"&&prod&&Number(qty)>prod.stock;
  const ok=pid&&Number(qty)>0&&!insuf;
  return(
    <Modal onClose={onClose} title={type==="venta"?"Registrar venta":"Registrar compra"}>
      <div style={{background:"#F7F4ED",borderRadius:9,padding:"12px 14px",marginBottom:16}}>
        <div style={{fontSize:11,color:"#9A9486",letterSpacing:".05em",marginBottom:8,display:"flex",alignItems:"center",gap:5}}><Ico name="Barcode" size={12}/>BUSCAR POR CODIGO</div>
        <div style={{display:"flex",gap:8}}>
          <input value={bci} onChange={e=>{setBCI(e.target.value);setBCMsg(null);}} onKeyDown={e=>e.key==="Enter"&&bci.trim()&&match(bci.trim())} style={{...st.inp,flex:1,background:"#fff"}} placeholder="Escanea o escribe y presiona Enter..."/>
          <button onClick={onCam} style={{background:"#20201D",color:"#fff",border:"none",borderRadius:7,padding:"0 12px",display:"flex",alignItems:"center",gap:5,fontSize:12,cursor:"pointer"}}><Ico name="Camera" size={14} color="#fff"/> Camara</button>
        </div>
        {bcMsg&&<div style={{fontSize:12,marginTop:7,color:bcMsg.ok?"#2F6B4F":"#B5402C",fontWeight:500}}>{bcMsg.t}</div>}
        {!bcMsg&&<div style={{fontSize:11,color:"#9A9486",marginTop:6}}>Con pistola USB: haz clic aqui y escanea.</div>}
      </div>
      <F label="Producto">
        <select value={pid} onChange={e=>setPid(e.target.value)} style={st.inp}>
          {prods.map(p=><option key={p.id} value={p.id}>{p.name}{p.barcode?" ["+p.barcode+"]":""} - stock: {p.stock} {p.unit||"u."}</option>)}
        </select>
      </F>
      <div style={{display:"flex",gap:10}}>
        <F label="Cantidad" s={{flex:1}}><input type="number" min="1" value={qty} onChange={e=>setQty(e.target.value)} style={st.inp}/></F>
        <F label={"Precio ($)"} s={{flex:1}}>
          <input type="number" value={price} onChange={e=>setPrice(e.target.value)} style={st.inp} placeholder={prod?String(type==="venta"?prod.sale:prod.cost):""}/>
        </F>
      </div>
      {insuf&&<div style={{color:"#B5402C",fontSize:12.5,marginBottom:10}}>Stock insuficiente ({prod.stock} {prod.unit||"u."} disponibles)</div>}
      {prod&&<div style={{fontSize:12.5,color:"#9A9486",marginBottom:14}}>Total: <strong style={{color:"#20201D"}}>{money((price!==""?Number(price):(type==="venta"?prod.sale:prod.cost))*(Number(qty)||0))}</strong></div>}
      <button disabled={!ok} className="sb" style={{...st.pbtn,background:type==="venta"?"#2F6B4F":"#B5402C",opacity:ok?1:.4}} onClick={()=>onSave({type,pid,qty,price})}>
        {type==="venta"?"Registrar venta":"Registrar compra"}
      </button>
    </Modal>
  );
}

function Resumen({lowStock,topSold,recent,prods,delMove}){
  return(
    <div style={{display:"grid",gap:16}}>
      {lowStock.length>0&&<Card title="Stock bajo" ico="Alert" ac="#C98A2E">
        {lowStock.map(p=><MR key={p.id}><span>{p.name}</span><span style={{color:"#C98A2E",fontWeight:600}}>{p.stock} {p.unit||"u."}</span></MR>)}
      </Card>}
      <Card title="Mas vendidos" ico="Up" ac="#2F6B4F">
        {!topSold.length?<Em t="Aun no hay ventas."/>:topSold.map(({p,q})=><MR key={p.id}><span>{p.name}</span><span style={{fontWeight:600}}>{q} und.</span></MR>)}
      </Card>
      <Card title="Ultimos movimientos" ico="Receipt" ac="#20201D">
        {!recent.length?<Em t="Registra tu primera venta o compra."/>:recent.map(m=><MRow key={m.id} m={m} prods={prods} onDel={delMove}/>)}
      </Card>
    </div>
  );
}
function Productos({prods,onEdit,onDel}){
  if(!prods.length) return <div style={st.card}><Em t="No tienes productos aun. Usa 'Producto' para agregar el primero."/></div>;
  return(
    <div style={st.card}><div style={{overflowX:"auto"}}>
      <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
        <thead><tr>
          <th style={st.th}>Producto</th>
          <th style={st.th} className="hm">Codigo</th>
          <th style={st.th}>Stock</th>
          <th style={st.th}>Costo</th>
          <th style={st.th}>Venta</th>
          <th style={st.th}></th>
        </tr></thead>
        <tbody>
          {prods.map(p=>(
            <tr key={p.id} className="rh" style={{cursor:"pointer"}} onClick={()=>onEdit(p)}>
              <td style={st.td}>{p.name}</td>
              <td style={{...st.td,fontFamily:"'IBM Plex Mono',monospace",fontSize:11,color:"#9A9486"}} className="hm">{p.barcode||"â€”"}</td>
              <td style={{...st.td,color:p.stock<=p.min?"#B5402C":"#20201D",fontWeight:p.stock<=p.min?600:400}}>{p.stock} {p.unit||"u."}</td>
              <td style={st.td}>{money(p.cost)}</td>
              <td style={st.td}>{money(p.sale)}</td>
              <td style={st.td}><button onClick={e=>{e.stopPropagation();onDel(p.id);}} style={st.ib}><Ico name="Trash" size={13} color="#B5402C"/></button></td>
            </tr>
          ))}
        </tbody>
      </table>
    </div></div>
  );
}
function Movimientos({moves,prods,onDel}){
  const s=useMemo(()=>[...moves].sort((a,b)=>(b.date+b.id).localeCompare(a.date+a.id)),[moves]);
  if(!s.length) return <div style={st.card}><Em t="No hay movimientos aun."/></div>;
  return <div style={st.card}>{s.map(m=><MRow key={m.id} m={m} prods={prods} onDel={onDel}/>)}</div>;
}
function MRow({m,prods,onDel}){
  const p=prods.find(x=>x.id===m.pid);
  const label=m.type==="gasto"?(m.note||"Gasto"):(p?p.name:"Producto eliminado");
  const color=m.type==="venta"?"#2F6B4F":"#B5402C";
  return(
    <div style={{display:"flex",alignItems:"center",padding:"10px 0",borderBottom:"1px solid #F1EDE2"}}>
      <div style={{flex:1,minWidth:0}}>
        <div style={{fontSize:13.5,fontWeight:500,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{label}</div>
        <div style={{fontSize:11.5,color:"#9A9486",fontFamily:"'IBM Plex Mono',monospace"}}>{fmtDate(m.date)} {m.type!=="gasto"?"- "+m.qty+" und.":""} - {m.type==="venta"?"Venta":m.type==="compra"?"Compra":"Gasto"}</div>
      </div>
      <div style={{fontFamily:"'IBM Plex Mono',monospace",fontWeight:600,color,marginRight:10,whiteSpace:"nowrap"}}>{m.type==="venta"?"+":"-"}{money(m.total)}</div>
      <button onClick={()=>onDel(m)} style={st.ib}><Ico name="Trash" size={13} color="#9A9486"/></button>
    </div>
  );
}

function Card({title,ico,ac,children}){return <div style={st.card}><div style={{display:"flex",alignItems:"center",gap:7,marginBottom:12}}><Ico name={ico} size={15} color={ac}/><h3 style={{margin:0,fontFamily:"'Space Grotesk',sans-serif",fontSize:14.5,fontWeight:600}}>{title}</h3></div>{children}</div>;}
function MR({children}){return <div style={{display:"flex",justifyContent:"space-between",fontSize:13.5,padding:"4px 0"}}>{children}</div>;}
function Em({t}){return <div style={{color:"#9A9486",fontSize:13,padding:"6px 0"}}>{t}</div>;}
function F({label,children,s}){return <div style={{marginBottom:13,...s}}><label style={{display:"block",fontSize:11,color:"#9A9486",marginBottom:5}}>{label}</label>{children}</div>;}
function Modal({title,children,onClose}){
  return(
    <div style={{position:"fixed",inset:0,background:"rgba(32,32,29,.5)",display:"flex",alignItems:"flex-end",justifyContent:"center",zIndex:50}} onClick={onClose}>
      <div style={{background:"#fff",width:"100%",maxWidth:480,borderRadius:"14px 14px 0 0",padding:"20px 18px 28px",maxHeight:"90vh",overflowY:"auto"}} onClick={e=>e.stopPropagation()}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}}>
          <h3 style={{margin:0,fontFamily:"'Space Grotesk',sans-serif",fontSize:16,fontWeight:600}}>{title}</h3>
          <button onClick={onClose} style={st.ib}><Ico name="X" size={17} color="#9A9486"/></button>
        </div>
        {children}
      </div>
    </div>
  );
}

const st={
  app:      {minHeight:"100vh",background:"#F7F4ED",fontFamily:"'Space Grotesk',sans-serif",color:"#20201D"},
  perf:     {height:5,backgroundImage:"radial-gradient(circle,#F7F4ED 2.5px,transparent 2.6px)",backgroundSize:"12px 8px"},
  storeInput:{border:"none",outline:"none",background:"transparent",fontFamily:"'Space Grotesk',sans-serif",fontWeight:700,fontSize:18,color:"#20201D",width:"100%"},
  meta:     {fontFamily:"'IBM Plex Mono',monospace",fontSize:10,color:"#9A9486",letterSpacing:".06em",marginTop:2,marginLeft:28},
  dashed:   {borderTop:"1.5px dashed #D8D2C2",margin:"14px 0 12px"},
  vd:       {width:1,alignSelf:"stretch",background:"#EAE5D8",margin:"0 12px"},
  tab:      {background:"none",border:"none",paddingBottom:10,fontSize:13,fontFamily:"'Space Grotesk',sans-serif",cursor:"pointer"},
  card:     {background:"#fff",border:"1px solid #EAE5D8",borderRadius:10,padding:16},
  th:       {textAlign:"left",fontFamily:"'IBM Plex Mono',monospace",fontSize:10,color:"#9A9486",letterSpacing:".06em",padding:"0 8px 8px 0",borderBottom:"1px solid #EAE5D8"},
  td:       {padding:"10px 8px 10px 0",borderBottom:"1px solid #F1EDE2",whiteSpace:"nowrap"},
  ib:       {background:"none",border:"none",padding:6,display:"flex",alignItems:"center",borderRadius:6,cursor:"pointer"},
  inp:      {width:"100%",padding:"9px 11px",borderRadius:7,border:"1px solid #D8D2C2",outline:"none",fontSize:13.5,background:"#FBFAF6",color:"#20201D"},
  pbtn:     {width:"100%",border:"none",color:"#fff",background:"#20201D",padding:"12px 0",borderRadius:8,fontWeight:600,fontSize:14,fontFamily:"'Space Grotesk',sans-serif",marginTop:2,cursor:"pointer"},
  toast:    {position:"fixed",bottom:20,left:"50%",transform:"translateX(-50%)",background:"#20201D",color:"#fff",padding:"10px 18px",borderRadius:8,fontSize:13,fontFamily:"'IBM Plex Mono',monospace",zIndex:100,boxShadow:"0 4px 14px rgba(0,0,0,.2)",whiteSpace:"nowrap"},
};

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
