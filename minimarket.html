<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Control de Caja — Minimarket</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #F7F4ED; font-family: 'Space Grotesk', sans-serif; }
    input, select, textarea, button { font-family: 'IBM Plex Mono', monospace; }
    button { cursor: pointer; }
    ::selection { background: #2F6B4F22; }
    .tab-btn { transition: color .15s, border-color .15s; }
    .row-hover:hover { background: #F1EDE2; }
    .scale-btn:active { transform: scale(.97); }
    @media (max-width: 600px) { .hide-mobile { display: none !important; } }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
const { useState, useEffect, useMemo, useCallback, useRef } = React;

/* localStorage wrapper */
const db = {
  get: (k) => { try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : null; } catch(_){return null;} },
  set: (k, v) => { try { localStorage.setItem(k, JSON.stringify(v)); } catch(_){} }
};

const uid    = () => Math.random().toString(36).slice(2,9) + Date.now().toString(36);
const money  = (n) => new Intl.NumberFormat("es-CL",{style:"currency",currency:"CLP",maximumFractionDigits:0}).format(Math.round(n||0));
const todayStr = () => new Date().toISOString().slice(0,10);
const fmtDate  = (d) => new Date(d+"T00:00:00").toLocaleDateString("es-CL",{day:"2-digit",month:"short"});

/* Inline SVG icons */
function Ico({ name, size=16, color="currentColor" }) {
  const p = { width:size, height:size, viewBox:"0 0 24 24", fill:"none", stroke:color, strokeWidth:2, strokeLinecap:"round", strokeLinejoin:"round" };
  if (name==="Plus")          return <svg {...p}><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>;
  if (name==="Trash2")        return <svg {...p}><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>;
  if (name==="TrendingUp")    return <svg {...p}><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>;
  if (name==="TrendingDown")  return <svg {...p}><polyline points="23 18 13.5 8.5 8.5 13.5 1 6"/><polyline points="17 18 23 18 23 12"/></svg>;
  if (name==="Package")       return <svg {...p}><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>;
  if (name==="Receipt")       return <svg {...p}><path d="M4 2v20l2-1 2 1 2-1 2 1 2-1 2 1 2-1 2 1V2l-2 1-2-1-2 1-2-1-2 1-2-1-2 1-2-1z"/><line x1="8" y1="10" x2="16" y2="10"/><line x1="8" y1="14" x2="16" y2="14"/></svg>;
  if (name==="AlertTriangle") return <svg {...p}><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>;
  if (name==="X")             return <svg {...p}><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>;
  if (name==="Store")         return <svg {...p}><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>;
  if (name==="Camera")        return <svg {...p}><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>;
  if (name==="Barcode")       return <svg {...p}><line x1="3" y1="5" x2="3" y2="19"/><line x1="7" y1="5" x2="7" y2="19"/><line x1="11" y1="5" x2="11" y2="19"/><line x1="15" y1="5" x2="15" y2="19"/><line x1="19" y1="5" x2="19" y2="19"/></svg>;
  return null;
}

/* Camera Barcode Scanner */
function BarcodeCamera({ onDetected, onClose }) {
  const videoRef = useRef(null);
  const streamRef = useRef(null);
  const scanRef = useRef(true);
  const [status, setStatus] = useState("Iniciando camara...");
  const supported = "BarcodeDetector" in window;

  useEffect(() => {
    if (!supported) return;
    (async () => {
      try {
        const det = new window.BarcodeDetector({ formats: ["ean_13","ean_8","upc_a","upc_e","code_128","code_39","itf"] });
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: { ideal:"environment" }, width:{ideal:1280} } });
        streamRef.current = stream;
        if (videoRef.current) { videoRef.current.srcObject = stream; await videoRef.current.play(); }
        setStatus("Apunta al codigo de barras...");
        const loop = async () => {
          if (!scanRef.current) return;
          try { const codes = await det.detect(videoRef.current); if (codes.length>0) { onDetected(codes[0].rawValue); return; } } catch(_){}
          setTimeout(loop, 250);
        };
        loop();
      } catch(e) { setStatus("Sin acceso a la camara. Revisa permisos del navegador."); }
    })();
    return () => { scanRef.current=false; streamRef.current?.getTracks().forEach(t=>t.stop()); };
  }, []);

  const ov  = { position:"fixed",inset:0,background:"rgba(0,0,0,.85)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center",padding:16 };
  const bx  = { background:"#fff",borderRadius:14,padding:18,width:"100%",maxWidth:420 };
  const btn = { width:"100%",background:"#20201D",color:"#fff",border:"none",borderRadius:8,padding:"10px 0",fontWeight:600,fontSize:14,marginTop:12,cursor:"pointer" };

  if (!supported) return (
    <div style={ov}><div style={bx}>
      <p style={{color:"#B5402C",textAlign:"center",fontSize:14,lineHeight:1.6,marginBottom:12}}>
        Tu navegador no soporta escaner por camara.<br/>Usa <strong>Chrome</strong> o conecta una pistola lectora USB.
      </p>
      <button onClick={onClose} style={btn}>Cerrar</button>
    </div></div>
  );

  return (
    <div style={ov}><div style={bx}>
      <div style={{position:"relative",background:"#000",borderRadius:10,overflow:"hidden",marginBottom:12}}>
        <video ref={videoRef} muted playsInline style={{width:"100%",maxHeight:300,display:"block"}}/>
        <div style={{position:"absolute",inset:"10%",pointerEvents:"none"}}>
          {[{top:0,left:0,borderTopLeftRadius:6,borderTop:"3px solid #2F6B4F",borderLeft:"3px solid #2F6B4F"},
            {top:0,right:0,borderTopRightRadius:6,borderTop:"3px solid #2F6B4F",borderRight:"3px solid #2F6B4F"},
            {bottom:0,left:0,borderBottomLeftRadius:6,borderBottom:"3px solid #2F6B4F",borderLeft:"3px solid #2F6B4F"},
            {bottom:0,right:0,borderBottomRightRadius:6,borderBottom:"3px solid #2F6B4F",borderRight:"3px solid #2F6B4F"}
          ].map((c,i)=><div key={i} style={{position:"absolute",width:22,height:22,...c}}/>)}
          <div style={{position:"absolute",left:"5%",right:"5%",top:"50%",height:2,background:"#2F6B4F",opacity:.85}}/>
        </div>
      </div>
      <p style={{textAlign:"center",fontSize:13,color:"#9A9486",fontFamily:"'IBM Plex Mono',monospace",marginBottom:4}}>{status}</p>
      <button onClick={onClose} style={btn}>Cancelar</button>
    </div></div>
  );
}

/* Main App */
function App() {
  const [storeName, setStoreName]   = useState(() => db.get("storeName") || "Mi Minimarket");
  const [products,  setProducts]    = useState(() => db.get("products")  || []);
  const [movements, setMovements]   = useState(() => db.get("movements") || []);
  const [tab,       setTab]         = useState("resumen");
  const [showProductModal, setShowProductModal] = useState(false);
  const [showMoveModal,    setShowMoveModal]    = useState(null);
  const [editingProduct,   setEditingProduct]   = useState(null);
  const [toast,            setToast]            = useState(null);
  const [showCamera,       setShowCamera]       = useState(null);
  const [pendingBarcode,   setPendingBarcode]   = useState(null);

  useEffect(()=>{ db.set("products",  products);  }, [products]);
  useEffect(()=>{ db.set("movements", movements); }, [movements]);
  useEffect(()=>{ db.set("storeName", storeName); }, [storeName]);

  const showToast = useCallback((msg)=>{ setToast(msg); setTimeout(()=>setToast(null),2400); },[]);

  const totals = useMemo(()=>{
    let i=0,e=0;
    for(const m of movements){ if(m.type==="venta") i+=m.total; else e+=m.total; }
    return {ingresos:i,egresos:e,saldo:i-e};
  },[movements]);

  const lowStock    = useMemo(()=>products.filter(p=>p.stock<=p.minStock),[products]);
  const topVendidos = useMemo(()=>{
    const map={};
    for(const m of movements){ if(m.type!=="venta") continue; map[m.productId]=(map[m.productId]||0)+m.qty; }
    return Object.entries(map).map(([id,qty])=>({product:products.find(p=>p.id===id),qty})).filter(x=>x.product).sort((a,b)=>b.qty-a.qty).slice(0,5);
  },[movements,products]);
  const recentMoves = useMemo(()=>[...movements].sort((a,b)=>(b.date+b.id).localeCompare(a.date+a.id)).slice(0,14),[movements]);

  const saveProduct = (data) => {
    if(data.id){ setProducts(p=>p.map(x=>x.id===data.id?{...x,...data}:x)); showToast("Producto actualizado"); }
    else        { setProducts(p=>[...p,{...data,id:uid()}]); showToast("Producto agregado"); }
    setShowProductModal(false); setEditingProduct(null); setPendingBarcode(null);
  };
  const deleteProduct = (id) => { setProducts(p=>p.filter(x=>x.id!==id)); showToast("Producto eliminado"); };

  const registerMove = ({type,productId,qty,unitPrice,note}) => {
    qty=Number(qty); const date=todayStr();
    if(type==="gasto"){ setMovements(m=>[...m,{id:uid(),type:"gasto",productId:null,qty:1,unitPrice:Number(unitPrice),total:Number(unitPrice),date,note}]); showToast("Gasto registrado"); setShowMoveModal(null); return; }
    const product=products.find(p=>p.id===productId);
    if(!product) return;
    const price=(unitPrice!==""&&unitPrice!==undefined)?Number(unitPrice):(type==="venta"?product.salePrice:product.costPrice);
    setProducts(p=>p.map(x=>x.id===productId?{...x,stock:x.stock+(type==="venta"?-qty:qty)}:x));
    setMovements(m=>[...m,{id:uid(),type,productId,qty,unitPrice:price,total:price*qty,date,note:note||""}]);
    showToast(type==="venta"?"Venta registrada":"Compra registrada"); setShowMoveModal(null);
  };
  const deleteMove = (m) => {
    if(m.type!=="gasto") setProducts(p=>p.map(x=>x.id===m.productId?{...x,stock:x.stock+(m.type==="venta"?m.qty:-m.qty)}:x));
    setMovements(p=>p.filter(x=>x.id!==m.id)); showToast("Movimiento eliminado");
  };

  const handleCameraProduct = (code) => { setShowCamera(null); setPendingBarcode(code); setShowProductModal(true); showToast("Codigo: "+code); };
  const handleCameraMove    = (code) => { setShowCamera(null); setPendingBarcode(code); };

  const S = styles;
  return (
    <div style={S.app}>
      {toast && <div style={S.toast}>{toast}</div>}
      {showCamera==="product" && <BarcodeCamera onDetected={handleCameraProduct} onClose={()=>setShowCamera(null)}/>}
      {showCamera==="move"    && <BarcodeCamera onDetected={handleCameraMove}    onClose={()=>setShowCamera(null)}/>}

      {/* Header */}
      <div style={{padding:"20px 16px 0",display:"flex",justifyContent:"center"}}>
        <div style={{width:"100%",maxWidth:720,background:"#fff",boxShadow:"0 1px 4px rgba(0,0,0,.07)"}}>
          <div style={S.perf}/>
          <div style={{padding:"20px 24px 16px"}}>
            <div style={{display:"flex",alignItems:"center",gap:9}}><Ico name="Store" size={19}/><input value={storeName} onChange={e=>setStoreName(e.target.value)} style={S.storeInput} aria-label="Nombre del negocio"/></div>
            <div style={S.meta}>CONTROL DE CAJA · {new Date().toLocaleDateString("es-CL",{weekday:"long",day:"2-digit",month:"long",year:"numeric"}).toUpperCase()}</div>
            <div style={S.dashed}/>
            <div style={{display:"flex",alignItems:"center"}}>
              <SCell label="INGRESOS" value={money(totals.ingresos)} color="#2F6B4F" icon="TrendingUp"/>
              <div style={S.vDiv}/>
              <SCell label="EGRESOS"  value={money(totals.egresos)}  color="#B5402C" icon="TrendingDown"/>
              <div style={S.vDiv}/>
              <SCell label="SALDO"    value={money(totals.saldo)}    color={totals.saldo>=0?"#20201D":"#B5402C"} icon="Receipt"/>
            </div>
          </div>
          <div style={S.perf}/>
        </div>
      </div>

      {/* Tabs */}
      <div style={{display:"flex",gap:20,maxWidth:720,margin:"0 auto",padding:"16px 16px 0",borderBottom:"1px solid #EAE5D8"}}>
        {[{k:"resumen",l:"Resumen"},{k:"productos",l:"Productos ("+products.length+")"},{k:"movimientos",l:"Movimientos"}].map(t=>(
          <button key={t.k} className="tab-btn" onClick={()=>setTab(t.k)}
            style={{...S.tab,color:tab===t.k?"#20201D":"#9A9486",borderBottom:tab===t.k?"2px solid #20201D":"2px solid transparent",fontWeight:tab===t.k?600:500}}>
            {t.l}
          </button>
        ))}
      </div>

      {/* Quick actions */}
      <div style={{display:"flex",gap:8,maxWidth:720,margin:"14px auto 0",padding:"0 16px",flexWrap:"wrap"}}>
        <ABtn bg="#2F6B4F" onClick={()=>{setPendingBarcode(null);setShowMoveModal("venta");}}><Ico name="Plus" size={13}/> Venta</ABtn>
        <ABtn bg="#B5402C" onClick={()=>{setPendingBarcode(null);setShowMoveModal("compra");}}><Ico name="Plus" size={13}/> Compra</ABtn>
        <ABtn bg="#C98A2E" onClick={()=>{setPendingBarcode(null);setShowMoveModal("gasto");}}><Ico name="Plus" size={13}/> Gasto</ABtn>
        <ABtn bg="#20201D" onClick={()=>{setEditingProduct(null);setPendingBarcode(null);setShowProductModal(true);}}><Ico name="Package" size={13}/> Producto</ABtn>
        <ABtn bg="#4A5568" onClick={()=>setShowCamera("product")}><Ico name="Camera" size={13}/> Escanear producto</ABtn>
      </div>

      {/* Content */}
      <div style={{maxWidth:720,margin:"18px auto 0",padding:"0 16px"}}>
        {tab==="resumen"     && <Resumen lowStock={lowStock} topVendidos={topVendidos} recentMoves={recentMoves} products={products} deleteMove={deleteMove}/>}
        {tab==="productos"   && <Productos products={products} onEdit={p=>{setEditingProduct(p);setShowProductModal(true);}} onDelete={deleteProduct}/>}
        {tab==="movimientos" && <Movimientos movements={movements} products={products} onDelete={deleteMove}/>}
      </div>

      {showProductModal && (
        <ProductModal product={editingProduct} initialBarcode={pendingBarcode}
          onClose={()=>{setShowProductModal(false);setEditingProduct(null);setPendingBarcode(null);}}
          onSave={saveProduct} onScanBarcode={()=>setShowCamera("product")}/>
      )}
      {showMoveModal && (
        <MoveModal type={showMoveModal} products={products} initialBarcode={pendingBarcode}
          onClose={()=>{setShowMoveModal(null);setPendingBarcode(null);}}
          onSave={registerMove}
          onScanBarcode={()=>{setShowCamera("move");setShowMoveModal(null);}}
          findByBarcode={(code)=>products.find(x=>x.barcode===code)}/>
      )}
    </div>
  );
}

function ABtn({bg,onClick,children}){ return <button className="scale-btn" onClick={onClick} style={{display:"flex",alignItems:"center",gap:5,background:bg,color:"#fff",border:"none",borderRadius:7,padding:"8px 13px",fontSize:12.5,fontWeight:600}}>{children}</button>; }
function SCell({label,value,color,icon}){ return <div style={{flex:1,minWidth:0}}><div style={{display:"flex",alignItems:"center",gap:5,color:"#9A9486",fontSize:10.5,letterSpacing:".07em",marginBottom:3}}><Ico name={icon} size={11}/>{label}</div><div style={{fontFamily:"'IBM Plex Mono',monospace",fontWeight:600,fontSize:"clamp(14px,3.8vw,19px)",color,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{value}</div></div>; }

/* ProductModal */
function ProductModal({product,initialBarcode,onClose,onSave,onScanBarcode}){
  const [name,setCostPriceFlag]=[useState(product?.name||"")];
  const [nm,setNm]=useState(product?.name||"");
  const [bc,setBc]=useState(initialBarcode||product?.barcode||"");
  const [unit,setUnit]=useState(product?.unit||"u.");
  const [stock,setStock]=useState(product?.stock??0);
  const [minStock,setMinStock]=useState(product?.minStock??5);
  const [costPrice,setCostPrice]=useState(product?.costPrice??"");
  const [salePrice,setSalePrice]=useState(product?.salePrice??"");
  const valid=nm.trim()&&costPrice!==""&&salePrice!=="";
  const S=styles;
  return (
    <Modal onClose={onClose} title={product?"Editar producto":"Nuevo producto"}>
      <div style={{background:"#F7F4ED",borderRadius:9,padding:"12px 14px",marginBottom:16}}>
        <div style={{fontSize:11,color:"#9A9486",letterSpacing:".06em",marginBottom:8,display:"flex",alignItems:"center",gap:5}}><Ico name="Barcode" size={12}/>CODIGO DE BARRAS (opcional)</div>
        <div style={{display:"flex",gap:8}}>
          <input value={bc} onChange={e=>setBc(e.target.value)} onKeyDown={e=>e.key==="Enter"&&e.preventDefault()}
            style={{...S.input,flex:1,background:"#fff",letterSpacing:".05em"}} placeholder="Escanea o escribe el codigo..."/>
          <button onClick={onScanBarcode} style={{background:"#20201D",color:"#fff",border:"none",borderRadius:7,padding:"0 12px",display:"flex",alignItems:"center",gap:5,fontSize:12,whiteSpace:"nowrap",cursor:"pointer"}}>
            <Ico name="Camera" size={14} color="#fff"/> Camara
          </button>
        </div>
        <div style={{fontSize:11,color:"#9A9486",marginTop:6}}>Con pistola USB: haz clic en el campo y escanea.</div>
      </div>
      <Field label="Nombre del producto"><input autoFocus={!initialBarcode} value={nm} onChange={e=>setNm(e.target.value)} style={S.input} placeholder="Ej: Coca-Cola 1.5L"/></Field>
      <div style={{display:"flex",gap:10}}>
        <Field label="Stock actual" style={{flex:1}}><input type="number" value={stock} onChange={e=>setStock(e.target.value)} style={S.input}/></Field>
        <Field label="Unidad" style={{flex:1}}><input value={unit} onChange={e=>setUnit(e.target.value)} style={S.input} placeholder="u. / kg / pack"/></Field>
      </div>
      <div style={{display:"flex",gap:10}}>
        <Field label="Costo compra ($)" style={{flex:1}}><input type="number" value={costPrice} onChange={e=>setCostPrice(e.target.value)} style={S.input}/></Field>
        <Field label="Precio venta ($)" style={{flex:1}}><input type="number" value={salePrice} onChange={e=>setSalePrice(e.target.value)} style={S.input}/></Field>
      </div>
      <Field label="Alertar cuando baje de"><input type="number" value={minStock} onChange={e=>setMinStock(e.target.value)} style={S.input}/></Field>
      <button disabled={!valid} className="scale-btn" style={{...S.primaryBtn,opacity:valid?1:.4}}
        onClick={()=>onSave({id:product?.id,name:nm.trim(),barcode:bc.trim(),unit:unit.trim()||"u.",stock:Number(stock)||0,minStock:Number(minStock)||0,costPrice:Number(costPrice),salePrice:Number(salePrice)})}>
        {product?"Guardar cambios":"Agregar producto"}
      </button>
    </Modal>
  );
}

/* MoveModal */
function MoveModal({type,products,initialBarcode,onClose,onSave,onScanBarcode,findByBarcode}){
  const [productId,setProductId]=useState(products[0]?.id||"");
  const [qty,setQty]=useState(1);
  const [unitPrice,setUnitPrice]=useState("");
  const [note,setNote]=useState("");
  const [barcodeInput,setBarcodeInput]=useState(initialBarcode||"");
  const [barcodeMsg,setBarcodeMsg]=useState(null);
  const product=products.find(p=>p.id===productId);
  useEffect(()=>{ if(initialBarcode) tryMatch(initialBarcode); },[]);
  const tryMatch=(code)=>{
    const found=findByBarcode(code.trim());
    if(found){ setProductId(found.id); setBarcodeMsg({ok:true,text:"Producto: "+found.name}); setBarcodeInput(code); }
    else      { setBarcodeMsg({ok:false,text:"Sin producto con codigo \""+code+"\". Agregalo primero."}); }
  };
  const S=styles;
  const insufficient=type==="venta"&&product&&Number(qty)>product.stock;
  if(type==="gasto"){
    const valid=note.trim()&&unitPrice!==""&&Number(unitPrice)>0;
    return (
      <Modal onClose={onClose} title="Registrar gasto">
        <Field label="Descripcion"><input autoFocus value={note} onChange={e=>setNote(e.target.value)} style={S.input} placeholder="Ej: Pago de luz, arriendo..."/></Field>
        <Field label="Monto ($)"><input type="number" value={unitPrice} onChange={e=>setUnitPrice(e.target.value)} style={S.input}/></Field>
        <button disabled={!valid} className="scale-btn" style={{...S.primaryBtn,background:"#C98A2E",opacity:valid?1:.4}} onClick={()=>onSave({type:"gasto",unitPrice,note})}>Registrar gasto</button>
      </Modal>
    );
  }
  if(products.length===0) return <Modal onClose={onClose} title="Sin productos"><p style={{color:"#9A9486",fontSize:13}}>Primero agrega un producto.</p></Modal>;
  const valid=productId&&Number(qty)>0&&!insufficient;
  return (
    <Modal onClose={onClose} title={type==="venta"?"Registrar venta":"Registrar compra"}>
      <div style={{background:"#F7F4ED",borderRadius:9,padding:"12px 14px",marginBottom:16}}>
        <div style={{fontSize:11,color:"#9A9486",letterSpacing:".06em",marginBottom:8,display:"flex",alignItems:"center",gap:5}}><Ico name="Barcode" size={12}/>BUSCAR POR CODIGO DE BARRAS</div>
        <div style={{display:"flex",gap:8}}>
          <input value={barcodeInput} onChange={e=>{setBarcodeInput(e.target.value);setBarcodeMsg(null);}}
            onKeyDown={e=>e.key==="Enter"&&barcodeInput.trim()&&tryMatch(barcodeInput.trim())}
            style={{...S.input,flex:1,background:"#fff",letterSpacing:".05em"}} placeholder="Escanea o escribe y presiona Enter..."/>
          <button onClick={onScanBarcode} style={{background:"#20201D",color:"#fff",border:"none",borderRadius:7,padding:"0 12px",display:"flex",alignItems:"center",gap:5,fontSize:12,whiteSpace:"nowrap",cursor:"pointer"}}>
            <Ico name="Camera" size={14} color="#fff"/> Camara
          </button>
        </div>
        {barcodeMsg && <div style={{fontSize:12,marginTop:7,color:barcodeMsg.ok?"#2F6B4F":"#B5402C",fontWeight:500}}>{barcodeMsg.text}</div>}
        {!barcodeMsg && <div style={{fontSize:11,color:"#9A9486",marginTop:6}}>Con pistola USB: haz clic aqui y escanea.</div>}
      </div>
      <Field label="Producto">
        <select value={productId} onChange={e=>setProductId(e.target.value)} style={S.input}>
          {products.map(p=><option key={p.id} value={p.id}>{p.name}{p.barcode?" ["+p.barcode+"]":""} - stock: {p.stock} {p.unit||"u."}</option>)}
        </select>
      </Field>
      <div style={{display:"flex",gap:10}}>
        <Field label="Cantidad" style={{flex:1}}><input type="number" min="1" value={qty} onChange={e=>setQty(e.target.value)} style={S.input}/></Field>
        <Field label={"Precio "+(type==="venta"?"venta":"compra")+" ($)"} style={{flex:1.4}}>
          <input type="number" value={unitPrice} onChange={e=>setUnitPrice(e.target.value)} style={S.input}
            placeholder={product?String(type==="venta"?product.salePrice:product.costPrice):""}/>
        </Field>
      </div>
      {insufficient && <div style={{color:"#B5402C",fontSize:12.5,marginBottom:10}}>Stock insuficiente ({product.stock} {product.unit||"u."} disponibles)</div>}
      {product && <div style={{fontSize:12.5,color:"#9A9486",marginBottom:14}}>Total: <strong style={{color:"#20201D"}}>{money((unitPrice!==""?Number(unitPrice):(type==="venta"?product.salePrice:product.costPrice))*(Number(qty)||0))}</strong></div>}
      <button disabled={!valid} className="scale-btn" style={{...S.primaryBtn,background:type==="venta"?"#2F6B4F":"#B5402C",opacity:valid?1:.4}}
        onClick={()=>onSave({type,productId,qty,unitPrice})}>
        {type==="venta"?"Registrar venta":"Registrar compra"}
      </button>
    </Modal>
  );
}

/* Resumen / Productos / Movimientos */
function Resumen({lowStock,topVendidos,recentMoves,products,deleteMove}){
  return (
    <div style={{display:"grid",gap:16}}>
      {lowStock.length>0 && <Card title="Stock bajo" icon="AlertTriangle" accent="#C98A2E">
        {lowStock.map(p=><div key={p.id} style={styles.miniRow}><span>{p.name}</span><span style={{color:"#C98A2E",fontWeight:600}}>{p.stock} {p.unit||"u."}</span></div>)}
      </Card>}
      <Card title="Mas vendidos" icon="TrendingUp" accent="#2F6B4F">
        {topVendidos.length===0?<Empty text="Aun no hay ventas."/>:topVendidos.map(({product,qty})=><div key={product.id} style={styles.miniRow}><span>{product.name}</span><span style={{fontWeight:600}}>{qty} und.</span></div>)}
      </Card>
      <Card title="Ultimos movimientos" icon="Receipt" accent="#20201D">
        {recentMoves.length===0?<Empty text="Registra tu primera venta o compra."/>:recentMoves.map(m=><MoveRow key={m.id} m={m} products={products} onDelete={deleteMove}/>)}
      </Card>
    </div>
  );
}
function Productos({products,onEdit,onDelete}){
  if(products.length===0) return <div style={styles.card}><Empty text="No tienes productos. Usa 'Producto' para agregar el primero."/></div>;
  return (
    <div style={styles.card}><div style={{overflowX:"auto"}}>
      <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
        <thead><tr>
          <th style={styles.th}>Producto</th>
          <th style={styles.th} className="hide-mobile">Codigo</th>
          <th style={styles.th}>Stock</th>
          <th style={styles.th}>Costo</th>
          <th style={styles.th}>Venta</th>
          <th style={styles.th}></th>
        </tr></thead>
        <tbody>
          {products.map(p=>(
            <tr key={p.id} className="row-hover" style={{cursor:"pointer"}} onClick={()=>onEdit(p)}>
              <td style={styles.td}>{p.name}</td>
              <td style={{...styles.td,fontFamily:"'IBM Plex Mono',monospace",fontSize:11.5,color:"#9A9486"}} className="hide-mobile">{p.barcode||"—"}</td>
              <td style={{...styles.td,color:p.stock<=p.minStock?"#B5402C":"#20201D",fontWeight:p.stock<=p.minStock?600:400}}>{p.stock} {p.unit||"u."}</td>
              <td style={styles.td}>{money(p.costPrice)}</td>
              <td style={styles.td}>{money(p.salePrice)}</td>
              <td style={styles.td}><button onClick={e=>{e.stopPropagation();onDelete(p.id);}} style={styles.iconBtn}><Ico name="Trash2" size={13} color="#B5402C"/></button></td>
            </tr>
          ))}
        </tbody>
      </table>
    </div></div>
  );
}
function Movimientos({movements,products,onDelete}){
  const sorted=useMemo(()=>[...movements].sort((a,b)=>(b.date+b.id).localeCompare(a.date+a.id)),[movements]);
  if(sorted.length===0) return <div style={styles.card}><Empty text="No hay movimientos aun."/></div>;
  return <div style={styles.card}>{sorted.map(m=><MoveRow key={m.id} m={m} products={products} onDelete={onDelete}/>)}</div>;
}
function MoveRow({m,products,onDelete}){
  const product=products.find(p=>p.id===m.productId);
  const label=m.type==="gasto"?(m.note||"Gasto"):(product?product.name:"Producto eliminado");
  const color=m.type==="venta"?"#2F6B4F":"#B5402C";
  return (
    <div style={{display:"flex",alignItems:"center",padding:"10px 0",borderBottom:"1px solid #F1EDE2"}}>
      <div style={{flex:1,minWidth:0}}>
        <div style={{fontSize:13.5,fontWeight:500,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{label}</div>
        <div style={{fontSize:11.5,color:"#9A9486",fontFamily:"'IBM Plex Mono',monospace"}}>{fmtDate(m.date)} {m.type!=="gasto"?"- "+m.qty+" und.":""} - {m.type==="venta"?"Venta":m.type==="compra"?"Compra":"Gasto"}</div>
      </div>
      <div style={{fontFamily:"'IBM Plex Mono',monospace",fontWeight:600,color,marginRight:10,whiteSpace:"nowrap"}}>{m.type==="venta"?"+":"-"}{money(m.total)}</div>
      <button onClick={()=>onDelete(m)} style={styles.iconBtn}><Ico name="Trash2" size={13} color="#9A9486"/></button>
    </div>
  );
}

/* Primitives */
function Card({title,icon,accent,children}){ return <div style={styles.card}><div style={{display:"flex",alignItems:"center",gap:7,marginBottom:12}}><Ico name={icon} size={15} color={accent}/><h3 style={{margin:0,fontFamily:"'Space Grotesk',sans-serif",fontSize:14.5,fontWeight:600}}>{title}</h3></div>{children}</div>; }
function Empty({text}){ return <div style={{color:"#9A9486",fontSize:13,padding:"6px 0"}}>{text}</div>; }
function Field({label,children,style}){ return <div style={{marginBottom:13,...style}}><label style={{display:"block",fontSize:11,color:"#9A9486",marginBottom:5,letterSpacing:".04em"}}>{label}</label>{children}</div>; }
function Modal({title,children,onClose}){
  return (
    <div style={{position:"fixed",inset:0,background:"rgba(32,32,29,.5)",display:"flex",alignItems:"flex-end",justifyContent:"center",zIndex:50}} onClick={onClose}>
      <div style={{background:"#fff",width:"100%",maxWidth:480,borderRadius:"14px 14px 0 0",padding:"20px 18px 28px",maxHeight:"90vh",overflowY:"auto"}} onClick={e=>e.stopPropagation()}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}}>
          <h3 style={{margin:0,fontFamily:"'Space Grotesk',sans-serif",fontSize:16,fontWeight:600}}>{title}</h3>
          <button onClick={onClose} style={styles.iconBtn}><Ico name="X" size={17} color="#9A9486"/></button>
        </div>
        {children}
      </div>
    </div>
  );
}

const styles = {
  app:       { minHeight:"100vh", background:"#F7F4ED", fontFamily:"'Space Grotesk',sans-serif", color:"#20201D", paddingBottom:40 },
  perf:      { height:5, backgroundImage:"radial-gradient(circle,#F7F4ED 2.5px,transparent 2.6px)", backgroundSize:"12px 8px", backgroundPosition:"center" },
  storeInput:{ border:"none", outline:"none", background:"transparent", fontFamily:"'Space Grotesk',sans-serif", fontWeight:700, fontSize:18, color:"#20201D", width:"100%" },
  meta:      { fontFamily:"'IBM Plex Mono',monospace", fontSize:10, color:"#9A9486", letterSpacing:".06em", marginTop:2, marginLeft:28 },
  dashed:    { borderTop:"1.5px dashed #D8D2C2", margin:"14px 0 12px" },
  vDiv:      { width:1, alignSelf:"stretch", background:"#EAE5D8", margin:"0 12px" },
  tab:       { background:"none", border:"none", paddingBottom:10, fontSize:13, fontFamily:"'Space Grotesk',sans-serif" },
  card:      { background:"#fff", border:"1px solid #EAE5D8", borderRadius:10, padding:16 },
  miniRow:   { display:"flex", justifyContent:"space-between", fontSize:13.5, padding:"4px 0" },
  th:        { textAlign:"left", fontFamily:"'IBM Plex Mono',monospace", fontSize:10, color:"#9A9486", letterSpacing:".06em", padding:"0 8px 8px 0", borderBottom:"1px solid #EAE5D8" },
  td:        { padding:"10px 8px 10px 0", borderBottom:"1px solid #F1EDE2", whiteSpace:"nowrap" },
  iconBtn:   { background:"none", border:"none", padding:6, display:"flex", alignItems:"center", borderRadius:6 },
  input:     { width:"100%", padding:"9px 11px", borderRadius:7, border:"1px solid #D8D2C2", outline:"none", fontSize:13.5, background:"#FBFAF6", color:"#20201D" },
  primaryBtn:{ width:"100%", border:"none", color:"#fff", background:"#20201D", padding:"12px 0", borderRadius:8, fontWeight:600, fontSize:14, fontFamily:"'Space Grotesk',sans-serif", marginTop:2 },
  toast:     { position:"fixed", bottom:20, left:"50%", transform:"translateX(-50%)", background:"#20201D", color:"#fff", padding:"10px 18px", borderRadius:8, fontSize:13, fontFamily:"'IBM Plex Mono',monospace", zIndex:100, boxShadow:"0 4px 14px rgba(0,0,0,.2)", whiteSpace:"nowrap" },
};

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
